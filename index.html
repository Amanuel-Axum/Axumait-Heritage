<!DOCTYPE html>
<html>
<head>
    <title>ቤተ መጻሕፍቲ ኣክሲማዊት</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .card { border: 5px solid #000; background-color: #2b2b2b; max-width: 600px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px #d4af37; }
        h1 { color: #d4af37; }
        img { width: 100%; border-radius: 10px; border: 2px solid #000; }
        button { background-color: #d4af37; color: black; font-weight: bold; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ቤተ መጻሕፍቲ ኣክሲማዊት ሄርቴጅ ፋውንዴሽን</h1>
        <img src="https://images.unsplash.com/photo-1599818861111-968600d81023?q=80&w=1000" alt="ሓውልቲ ኣክሱም">
        <h3>ሓውልቲ ኣክሱም</h3>
        <p>እንኳን ደስ አለህ አማኑኤል! ይህ የመጀመሪያው እውነተኛ ዌብሳይትህ ነው።</p>
        <button onclick="alert('ሰርቷል!')">እዚህ ይጫኑ</button>
    </div>
</body>
</html>
