<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቤተ መጻሕፍቲ ኣክሲማዊት</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 20px; }
        .container { border: 4px solid #d4af37; background-color: #1e1e1e; max-width: 550px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); }
        h1 { color: #d4af37; font-size: 2em; margin-bottom: 5px; }
        img { width: 100%; border-radius: 15px; border: 2px solid #333; margin: 15px 0; }
        p { font-size: 1.1em; line-height: 1.6; color: #ccc; }
        .feedback-btn { display: inline-block; background-color: #d4af37; color: #000; font-weight: bold; padding: 15px 30px; border-radius: 12px; text-decoration: none; font-size: 1.2em; margin-top: 25px; transition: 0.3s; }
        .feedback-btn:hover { background-color: #f1c40f; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>ቤተ መጻሕፍቲ ኣክሲማዊት</h1>
        <h3>ኣማኑኤል ጋዴ ዘበነ</h3>
        <img src="https://images.unsplash.com/photo-1599818861111-968600d81023?auto=format&fit=crop&w=800&q=80" alt="Axum Obelisk">
        <p>እንኳን ወደ አክሲማዊት ዲጂታል መረጃ መለዋወጫ በደህና መጡ። የተማሪዎችን ድምጽ ለመስማት ዝግጁ ነን።</p>
        
        <a href="https://forms.gle/ZVwYNGoywdSrMCoU9" class="feedback-btn">አስተያየት ለመስጠት እዚህ ይጫኑ</a>
    </div>
</body>
</html>
