<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axumait Lib - ቤተ መጻሕፍቲ ኣክሲማዊት</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #ffffff; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            background-color: #1e293b; 
            max-width: 500px; 
            margin: 30px auto; 
            padding: 30px; 
            border-radius: 25px; 
            border: 3px solid #d4af37; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .logo { 
            width: 100%; 
            max-width: 300px; 
            height: auto; 
            border-radius: 15px; 
            margin-bottom: 20px;
        }
        h1 { color: #d4af37; font-size: 1.8em; margin: 10px 0; }
        p { color: #cbd5e1; font-size: 1.1em; line-height: 1.6; }
        .feedback-btn { 
            display: inline-block; 
            background-color: #d4af37; 
            color: #0f172a; 
            font-weight: bold; 
            padding: 15px 35px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-size: 1.2em; 
            margin-top: 30px; 
            transition: 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        .feedback-btn:hover { 
            background-color: #f1c40f; 
            transform: scale(1.05); 
        }
        .footer { margin-top: 40px; font-size: 0.8em; color: #64748b; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Axumait Lib Logo" class="logo">
        
        <h1>ቤተ መጻሕፍቲ ኣክሲማዊት</h1>
        <p>ወደ አክሲማዊት ዲጂታል የዕውቀት መጋዘን እንኳን በደህና መጡ። የእርስዎ አስተያየት ለቤተ-መጻሕፍታችን ዕድገት ወሳኝ ነው።</p>
        
        <a href="https://forms.gle/ZVwYNGoywdSrMCoU9" class="feedback-btn">አስተያየት ለመስጠት</a>
        
        <div class="footer">
            © 2026 Axumait Lib - በአማኑኤል የተገነባ
        </div>
    </div>

</body>
</html>
